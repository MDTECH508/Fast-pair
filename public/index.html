<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAST WhatsApp Bot — Konekte ak QR / Pair Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0f, #0f0f1a);
      font-family: 'Inter', system-ui, sans-serif;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(18, 25, 45, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 28px;
    }
    h1 { font-size: 28px; background: linear-gradient(135deg, #fff, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 8px; }
    .sub { text-align: center; color: #8fa3cc; font-size: 14px; margin-bottom: 28px; }
    .qr-card {
      background: rgba(0,0,0,0.4);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      border: 1px solid rgba(37, 211, 102, 0.2);
      margin-bottom: 24px;
    }
    .qr-title { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; color: #25d366; margin-bottom: 16px; }
    #qrcode-img { background: white; padding: 12px; border-radius: 20px; display: inline-block; margin: 0 auto; }
    #qrcode-img img { width: 180px; height: auto; }
    .status { margin-top: 16px; font-size: 13px; padding: 8px 12px; border-radius: 40px; display: inline-block; }
    .status.waiting { background: rgba(245,158,11,0.15); color: #f59e0b; border:1px solid rgba(245,158,11,0.3); }
    .status.connected { background: rgba(74,222,128,0.15); color: #4ade80; border:1px solid rgba(74,222,128,0.3); }
    
    .pair-section {
      background: rgba(59,130,246,0.08);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
      border: 1px solid rgba(59,130,246,0.2);
    }
    .pair-input { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .pair-input input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 16px;
      color: white;
      font-size: 18px;
      text-align: center;
      font-family: monospace;
      letter-spacing: 4px;
    }
    .pair-input button, .action-btn {
      background: linear-gradient(135deg, #3b82f6, #0891b2);
      border: none;
      padding: 12px 20px;
      border-radius: 16px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .test-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .test-section input, .test-section textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      color: white;
      margin-bottom: 10px;
    }
    button.wa-send { background: #25d366; color: #000; width: 100%; }
    .note { font-size: 11px; color: #6a7a9a; text-align: center; margin-top: 20px; }
    .flex-btns { display: flex; gap: 10px; margin-top: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ FAST WhatsApp Bot</h1>
  <div class="sub">Konekte bot la ak WhatsApp ou — QR Code / Pair Code</div>

  <!-- QR CODE SECTION -->
  <div class="qr-card">
    <div class="qr-title"><span>📲</span> Scan QR kòd sa a</div>
    <div id="qrcode-img">
      <button class="action-btn" onclick="generateQR()">🔄 Jenere QR Kòd</button>
    </div>
    <div id="statusText" class="status waiting">⚡ Klike jenere QR kòd</div>
  </div>

  <!-- PAIR CODE SECTION -->
  <div class="pair-section">
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;">
      <span>🔑</span> Metòd altènatif: Pair Code
    </div>
    <div class="pair-input">
      <input type="text" id="pairCodeInput" placeholder="Kòd 8 chif" maxlength="8">
      <button onclick="verifyPairCode()">Verifye Kòd</button>
    </div>
    <div class="flex-btns">
      <button onclick="generatePairCode()" style="flex:1;">✨ Jenere nouvo kòd</button>
    </div>
    <div id="pairCodeDisplay" style="margin-top:12px;font-size:12px;color:#8fa3cc;"></div>
  </div>

  <!-- TEST MESSAGE SECTION -->
  <div class="test-section">
    <h3 style="font-size:14px;margin-bottom:10px;">📤 Tès voye mesaj</h3>
    <input type="text" id="testNumber" placeholder="Nimewo WhatsApp (eg: 50941951159)" value="50941951159">
    <textarea id="testMsg" rows="2" placeholder="Mesaj ou vle voye..."></textarea>
    <button class="wa-send" onclick="sendTestMessage()">📲 Voye mesaj tès</button>
  </div>

  <div class="note">
    💡 Aprè koneksyon, bot la ap reponn kesyon ou yo otomatikman.
  </div>
</div>

<script>
  let currentPairCode = null;

  // Jenere QR kòd
  async function generateQR() {
    document.getElementById('qrcode-img').innerHTML = '<div style="padding:20px;">Chajman...</div>';
    try {
      const response = await fetch('/api/whatsapp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getQR' })
      });
      const data = await response.json();
      if (data.success && data.qr) {
        document.getElementById('qrcode-img').innerHTML = `<img src="${data.qr}" alt="QR Code">`;
        document.getElementById('statusText').innerHTML = '📱 Scan QR la ak WhatsApp ou';
        document.getElementById('statusText').className = 'status waiting';
      }
    } catch (error) {
      document.getElementById('qrcode-img').innerHTML = `<button class="action-btn" onclick="generateQR()">🔄 Eseye ankò</button>`;
      document.getElementById('statusText').innerHTML = '❌ Erè jenere QR';
    }
  }

  // Jenere Pair Code
  async function generatePairCode() {
    try {
      const response = await fetch('/api/whatsapp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'generatePairCode' })
      });
      const data = await response.json();
      if (data.success) {
        currentPairCode = data.code;
        document.getElementById('pairCodeDisplay').innerHTML = `
          <strong style="color:#4ade80;">Kòd ou a: ${data.code}</strong><br>
          ${data.instructions}
        `;
        document.getElementById('pairCodeInput').value = data.code;
      }
    } catch (error) {
      alert('Erè jenere kòd');
    }
  }

  // Verifye Pair Code
  async function verifyPairCode() {
    const code = document.getElementById('pairCodeInput').value.trim();
    if (!code || code.length !== 8) {
      alert('Antre yon kòd 8 chif');
      return;
    }
    try {
      const response = await fetch('/api/whatsapp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'verifyPair', code: code })
      });
      const data = await response.json();
      if (data.success) {
        document.getElementById('statusText').innerHTML = '✅ ' + data.message;
        document.getElementById('statusText').className = 'status connected';
      } else {
        alert(data.error);
      }
    } catch (error) {
      alert('Erè verifye kòd');
    }
  }

  // Voye mesaj tès
  async function sendTestMessage() {
    const phone = document.getElementById('testNumber').value.trim();
    const message = document.getElementById('testMsg').value.trim();
    if (!phone || !message) {
      alert('Met nimewo ak mesaj');
      return;
    }
    // Netwaye nimewo a
    let cleanPhone = phone.replace(/[^0-9]/g, '');
    if (cleanPhone.startsWith('0')) cleanPhone = cleanPhone.substring(1);
    if (!cleanPhone.startsWith('509')) cleanPhone = '509' + cleanPhone;
    
    try {
      const response = await fetch('/api/whatsapp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          action: 'sendMessage', 
          phone: cleanPhone, 
          message: message 
        })
      });
      const data = await response.json();
      if (data.success) {
        alert('✅ Mesaj voye!');
        document.getElementById('testMsg').value = '';
      } else {
        alert('❌ Erè: ' + (data.error || 'Eseye ankò'));
      }
    } catch (error) {
      alert('Erè koneksyon');
    }
  }

  // Load QR otomatikman
  generateQR();
</script>
</body>
  </html>
